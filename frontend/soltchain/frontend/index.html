<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soltchain | Next-Gen Tokenomics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🚀 Soltchain Token Creator</h1>
    <div class="top-buttons">
      <a href="https://pancakeswap.finance" target="_blank" class="btn">PancakeSwap</a>
      <a href="https://dexscreener.com" target="_blank" class="btn">DexScreener</a>
      <a href="whitepaper.pdf" target="_blank" class="btn">Whitepaper</a>
    </div>
  </header>

  <div class="container">
    <h3>Create Your Token</h3>
    <input type="text" id="name" placeholder="Token Name" />
    <input type="text" id="symbol" placeholder="Symbol (e.g. SOLT)" />
    <input type="number" id="supply" placeholder="Total Supply" />

    <button onclick="createToken()">Create Token</button>

    <p id="result"></p>
  </div>

  <hr>

  <section class="roadmap">
    <h2>🗺️ Project Roadmap</h2>
    <ul>
      <li><strong>Phase 1:</strong> Foundation & Smart Contract Deployment</li>
      <li><strong>Phase 2:</strong> Marketing & Community Growth</li>
      <li><strong>Phase 3:</strong> SoltDex Launchpad Integration</li>
      <li><strong>Phase 4:</strong> Global Exchange Listings</li>
    </ul>
  </section>

  <script src="app.js"></script>

</body>
</html>
